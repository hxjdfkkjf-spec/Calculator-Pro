name: Build Android App Bundle
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Cordova & Build AAB
        run: |
          # 1. تثبيت كوردوفا
          npm install -g cordova
          
          # 2. إنشاء مشروع أندرويد جديد
          cordova create wrapper com.calculator.pro Calculator
          cd wrapper
          cordova platform add android
          
          # 3. مسح ملفات الويب الافتراضية
          rm -rf www/*
          cd ..
          
          # 4. نسخ ملفاتك (الآلة الحاسبة) إلى داخل تطبيق الأندرويد
          rsync -a --exclude='wrapper' --exclude='.git' --exclude='.github' ./ wrapper/www/
          
          # 5. بناء التطبيق كملف AAB للمتجر
          cd wrapper
          cordova build android --release -- --packageType=bundle

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Calculator-AAB
          path: wrapper/platforms/android/app/build/outputs/bundle/release/*.aab
