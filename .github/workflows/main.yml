name: Build Android App Bundle
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cordova & Build AAB
        run: |
          npm install -g cordova
          cordova create wrapper com.calculator.pro Calculator
          cd wrapper
          cordova platform add android
          rm -rf www/*
          cd ..
          rsync -a --exclude='wrapper' --exclude='.git' --exclude='.github' ./ wrapper/www/
          cd wrapper
          cordova build android --release -- --packageType=bundle

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Calculator-AAB
          path: wrapper/platforms/android/app/build/outputs/bundle/release/*.aab
